<!doctype html>
<html lang="en">

<head>
    <title>Tips — Keazyea's Intelligence Hub</title>
    <link rel="icon" href="images/KIH.jpg">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html,
        body {
            margin: 0;
            overflow-x: hidden;
        }

        .tips-search-wrap {
            max-width: 640px;
            margin: 0 auto 20px;
            padding: 0 16px;
        }

        .tips-search-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border-radius: 10px;
            border: 1px solid #2a2a4a;
            background: #16162a;
            color: white;
            box-sizing: border-box;
        }

        .tips-search-input::placeholder {
            color: #9a9ab0;
        }

        /* ---- GRID VIEW ---- */
        .tips-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 640px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .tip-card-preview {
            background: #16162a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 14px 20px;
            text-align: left;
            cursor: pointer;
            transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .tip-card-preview:hover {
            transform: translateY(-2px);
            border-color: #4169e1;
            background: #1c1c36;
        }

        .tip-card-preview-title {
            color: #4169e1;
            font-size: 1.05rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tip-card-preview-time {
            color: #9a9ab0;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        /* ---- DETAIL VIEW ---- */
        .tip-detail-wrap {
            max-width: 640px;
            margin: 0 auto;
            padding: 66px 16px 0;
        }

        body {
            margin: 0;
        }

        .back-to-tips-btn {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            height: 50px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            background: #16162a;
            border: none;
            border-bottom: 1px solid #2a2a4a;
            color: white;
            padding: 0 16px;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: left;
        }

        .back-to-tips-btn:hover {
            background: #1c1c2e;
        }

        .tip-card {
            padding: 20px 24px;
            background: #16162a;
            border: 1px solid #2a2a4a;
            border-radius: 14px;
            text-align: left;
        }

        .tip-title {
            color: #4169e1;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tip-body {
            white-space: pre-wrap;
            color: #d0d0da;
            line-height: 1.5;
        }

        .tip-time {
            color: #9a9ab0;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .tip-image {
            display: block;
            max-width: 100%;
            border-radius: 10px;
            margin-top: 14px;
        }

        .tips-empty {
            text-align: center;
            color: #9a9ab0;
            padding: 40px 16px;
        }
    </style>
</head>

<body>
    <h1 id="tipsPageTitle">Tips</h1>

    <div class="tips-search-wrap" id="tipsSearchWrap" style="display:none;">
        <input type="text" id="tipsSearchInput" class="tips-search-input" placeholder="Search tips by title...">
    </div>

    <div class="tips-grid" id="tipsGrid"></div>

    <div class="tip-detail-wrap" id="tipDetailWrap" style="display:none;">
        <button class="back-to-tips-btn" id="backToTipsBtn">← Back</button>
        <div id="tipDetailContent"></div>
    </div>

    <script type="module" src="appState.js"></script>
    <script type="module">
        let allTips = [];
        let currentFilter = "";

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
        }

        function renderGrid() {
            const grid = document.getElementById("tipsGrid");

            if (!allTips.length) {
                grid.innerHTML = '<div class="tips-empty" style="grid-column:1/-1;">No tips posted yet — check back soon!</div>';
                return;
            }

            const filtered = currentFilter
                ? allTips.filter(t => t.title.toLowerCase().includes(currentFilter.toLowerCase()))
                : allTips;

            if (!filtered.length) {
                grid.innerHTML = '<div class="tips-empty" style="grid-column:1/-1;">No tips match your search.</div>';
                return;
            }

            grid.innerHTML = filtered.map(t => `
                <div class="tip-card-preview" data-id="${t.id}">
                    <div class="tip-card-preview-title">${t.imageUrl ? "🖼️ " : "💡 "}${escapeHtml(t.title)}</div>
                    <div class="tip-card-preview-time">${new Date(t.createdAt).toLocaleString()}</div>
                </div>
            `).join("");

            grid.querySelectorAll(".tip-card-preview").forEach(card => {
                card.addEventListener("click", () => {
                    const tip = allTips.find(t => t.id === card.getAttribute("data-id"));
                    if (tip) showTipDetail(tip);
                });
            });
        }
        function showTipDetail(tip) {
            document.getElementById("tipsPageTitle").style.display = "none";
            document.getElementById("tipsGrid").style.display = "none";
            document.getElementById("tipsSearchWrap").style.display = "none";
            document.getElementById("tipDetailWrap").style.display = "block";

            document.getElementById("tipDetailContent").innerHTML = `
        <div class="tip-card">
            <div class="tip-title">${escapeHtml(tip.title)}</div>
            <div class="tip-body">${escapeHtml(tip.body)}</div>
            ${tip.imageUrl ? `<img class="tip-image" src="${escapeHtml(tip.imageUrl)}" alt="${escapeHtml(tip.title)}">` : ""}
            <div class="tip-time">${new Date(tip.createdAt).toLocaleString()}</div>
        </div>
    `;
            window.scrollTo({ top: 0, left: 0, behavior: "instant" });
        }

        function showGrid() {
            document.getElementById("tipDetailWrap").style.display = "none";
            document.getElementById("tipsPageTitle").style.display = "block";
            document.getElementById("tipsGrid").style.display = "flex";
            document.getElementById("tipsSearchWrap").style.display = allTips.length ? "block" : "none";
            window.scrollTo({ top: 0, left: 0, behavior: "instant" });
        }
        document.getElementById("backToTipsBtn").addEventListener("click", showGrid);

        document.getElementById("tipsSearchInput").addEventListener("input", (e) => {
            currentFilter = e.target.value;
            renderGrid();
        });


        async function loadTips() {
            allTips = await AppState.getTips();
            document.getElementById("tipsSearchWrap").style.display = allTips.length ? "block" : "none";
            renderGrid();

            const params = new URLSearchParams(window.location.search);
            const requestedTipId = params.get("tipId");
            if (requestedTipId) {
                const tip = allTips.find(t => t.id === requestedTipId);
                if (tip) showTipDetail(tip);
            }
        }

        loadTips();
    </script>
</body>

</html>
