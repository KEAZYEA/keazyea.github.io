        /* ================================================================
           SECTION 3: SHARED FORMATTING HELPERS
           Small utility functions used across both the Troops and Compare

           ================================================================ */

        function formatKey(key) {
            if (!key) return key;

            if (statDisplayMap[key]) return statDisplayMap[key];

            return key
                .replace(/_/g, " ")              // snake_case → spaces
                .replace(/([a-z])([A-Z])/g, "$1 $2") // camelCase → spaces
                .replace(/\b\w/g, c => c.toUpperCase()); // Title Case
        }

        function formatStatValue(key, val) {
            if (key === "upgradeCurrency" && val === "TalentSphere") {
                return "Books";
            }
            if (percentageKeys.has(key) && typeof val === "number") {
                return parseFloat((val * 100).toFixed(2)) + "%";
            }
            return val;
        }

        function getStatLabel(key, abilityInfoId) {
            if (key === "damageMultiplier" && damageReceivedAbilities[abilityInfoId]) {
                return "Damage Received";
            }
            return formatKey(key);
        }
        function getStatDescription(key, abilityInfoId) {
            if (key === "damageMultiplier" && damageReceivedAbilities[abilityInfoId]) {
                return damageReceivedDescriptions[abilityInfoId] || "Percentage of incoming damage taken while affected. Lower is better.";
            }
            return statDescriptions[key];
        }

        function getColor(key, leftVal, rightVal) {
            let speedOrder = { "low": 1, "medium": 2, "high": 3 };
            if (key === "speed") {
                let leftSpeed = speedOrder[leftVal.toLowerCase()];
                let rightSpeed = speedOrder[rightVal.toLowerCase()];
                return {
                    left: leftSpeed > rightSpeed ? "stat-better" : leftSpeed < rightSpeed ? "stat-worse" : "stat-neutral",
                    right: rightSpeed > leftSpeed ? "stat-better" : rightSpeed < leftSpeed ? "stat-worse" : "stat-neutral"
                };
            } else if (key === "attackSpeed" || key === "aspd" || key === "attackCooldown") {
                // lower is better
                return {
                    left: leftVal < rightVal ? "stat-better" : leftVal > rightVal ? "stat-worse" : "stat-neutral",
                    right: rightVal < leftVal ? "stat-better" : rightVal > leftVal ? "stat-worse" : "stat-neutral"
                };
            } else if (typeof leftVal === "number" && typeof rightVal === "number") {
                // higher is better
                return {
                    left: leftVal > rightVal ? "stat-better" : leftVal < rightVal ? "stat-worse" : "stat-neutral",
                    right: rightVal > leftVal ? "stat-better" : rightVal < leftVal ? "stat-worse" : "stat-neutral"
                };
            }
            return { left: "stat-neutral", right: "stat-neutral" };
        }

        /* ================================================================

           ================================================================ */

        function getAbilityDescription(abilityKey) {
            if (!abilityKey || !abilityData) return "";
            let entry = abilityData[abilityKey];
            if (!entry) return "";
            let locKey = entry.description_Localized; // correct spelling
            if (!locKey) return "";
            let locEntry = localization[locKey];
            if (!locEntry) return "";
            return en[locEntry.value] || "";
        }
        function getAbilityTitle(abilityInfoId) {
            if (!abilityInfoId || !abilityData) return "";
            let entry = abilityData[abilityInfoId];
            if (!entry) return "";
            let locKey = entry.title_Localized;
            if (!locKey) return "";
            let locEntry = localization[locKey];
            if (!locEntry) return "";
            return en[locEntry.value] || "";
        }
        function getTalentDescription(unitKey) {
            if (!unitKey || !heroTalentData) return "";
            // heroTalent.json entries have heroId matching the unit key
            // e.g. { "iceMage_talent": { heroId: "iceMage", description_Localized: "Hero_IceMage_Talent_Description" } }
            let entry = Object.values(heroTalentData).find(t => t.heroId === unitKey);
            if (!entry) return "";
            let locKey = entry.description_Localized;
            if (!locKey) return "";
            let locEntry = localization[locKey];
            if (!locEntry) return "";
            return en[locEntry.value] || "";
        }
        function getTalentModifier(talent) {
            if (!talent) return null;

            // Try direct lookup by addAbilityId (for talents that have it)
            if (talent.addAbilityId) {
                let result = hpAddModifierData[talent.addAbilityId]
                    || attackProbabilityModifierData[talent.addAbilityId]
                    || modifierData[talent.addAbilityId];
                if (result) return result;
            }

            // Fallback: construct key from talent name + level (e.g., "blackPlague_1")
            if (talent.name && talent.level) {
                let constructedKey = `${talent.name}_${talent.level}`;
                let result = modifierData[constructedKey];
                if (result) return result;
            }

            // Fallback: search by modifierKey matching talent.modifier
            if (talent.modifier) {
                let entry = Object.values(modifierData).find(m => m.modifierKey === talent.modifier);
                if (entry) return entry;
            }

            return null;
        }

        function getTalentIcon(unitKey) {
            if (!unitKey || !heroTalentData) return "";
            let entry = Object.values(heroTalentData).find(t => t.heroId === unitKey);
            return entry ? entry.icon : "";
        }


        function enrichAbilitiesWithInfo(abilities) {
            if (!abilities) return abilities;
            return abilities.map(a => {
                let info = abilityData[a.abilityInfoId];
                if (!info || info.isImmortalWhenActive !== true) return a;
                return { ...a, isImmortalWhenActive: true };
            });
        }
        function enrichTalentsWithModifiers(talents, unitKey) {
            if (!talents) return talents;
            let talentMeta = unitKey ? Object.values(heroTalentData).find(t => t.heroId === unitKey) : null;

            return talents.map(t => {
                let mod = getTalentModifier(t);
                let extra = {};
                if (mod) {
                    for (let k in mod) {
                        if (["key", "abilityInfoId", "units", "group", "modifier", "modifierKey", "caption", "format"].includes(k)) continue;
                        extra[k] = mod[k];
                    }
                }
                if (talentMeta) {
                    let levelInfo = heroTalentLevelData[`${talentMeta.key}_${t.level}`];
                    if (levelInfo) {
                        extra.upgradePrice = levelInfo.upgradePrice;
                        extra.upgradeCurrency = levelInfo.upgradeCurrency;
                    }
                }
                return { ...t, ...extra };
            });
        }

        function getSummonedUnitKey(abilities, talents, unitKey) {
            if (manualSummonOverrides[unitKey]) return manualSummonOverrides[unitKey];
            let raw = (abilities.find(a => a.summonedTroopId) || {}).summonedTroopId
                || (talents.find(t => t.summonedTroopId) || {}).summonedTroopId;
            if (raw) return raw.replace(/_\d+$/, "");
            return summonMap[unitKey] || null;
        }
        function getLinkedUnit(key) {
            let linkedKey = toggleMap[key];
            return linkedKey ? troopList.find(t => t.key === linkedKey) : null;
        }

        function buildHiddenTroopEntry(key) {
            let meta = troopMeta[key];
            if (!meta) return null;

            // resolve display name
            let nameKey = meta.name;
            let locEntry = localization[nameKey];
            let displayName = locEntry ? (en[locEntry.value] || nameKey) : (nameKey || key);

            // gather all level entries for this troop
            let levels = Object.values(troopLevels)
                .filter(t => t.troopId === key)
                .sort((a, b) => a.level - b.level);

            if (levels.length === 0) return null;

            return {
                key: key,
                displayName: displayName,
                rarity: (meta.rarityId || "common").toLowerCase(),
                meta: meta,
                levels: levels
            };
        }

        /* ================================================================

        function getTroopRoles(troopKey) {
            if (!troopRoleLinks) return [];
            return Object.values(troopRoleLinks)
                .filter(r => r.troopsId === troopKey)
                .map(r => {
                    let roleDef = Object.values(troopRoleDefs).find(d => d.troopsSetId === r.troopsSetId);
                    let displayName = r.troopsSetId;
                    if (roleDef) {
                        let locEntry = localization[roleDef.name];
                        displayName = locEntry ? (en[locEntry.value] || roleDef.name) : roleDef.name;
                    }
                    return { id: r.troopsSetId, displayName: displayName };

            for (let k in heroLevels) {

                if (!levelsByHero[hid]) levelsByHero[hid] = [];
                levelsByHero[hid].push(entry);

            // Sort each hero's levels ascending

                });

            // Sort heroes by order field so the list is predictable

            let levelsByTroops = {};
            for (let k in troopLevels) {

                let tid = entry.troopId;

        function buildSummonedUnitRows(unitKey, level, colspan) {
            let meta = troopMeta[unitKey];
            if (!meta) return "";

            // get level data — find closest available level
            let levelEntry = Object.values(troopLevels)
                .filter(t => t.troopId === unitKey)
                .sort((a, b) => a.level - b.level)
                .find(t => t.level >= level);
            if (!levelEntry) {
                // fallback to highest available
                let entries = Object.values(troopLevels)
                    .filter(t => t.troopId === unitKey)
                    .sort((a, b) => a.level - b.level);
                levelEntry = entries[entries.length - 1];
            }
            if (!levelEntry) return "";


            let nameKey = meta.name;
            let locEntry = localization[nameKey];
            let displayName = locEntry ? (en[locEntry.value] || nameKey) : (nameKey || unitKey);

            let html = `
        <tr>
            <td colspan="${colspan}" class="img-row">
                <img class="troop-img" src="images/${unitKey.toUpperCase()}.jpg" alt="${displayName}" />
                <div class="ability-name">${displayName}</div>
                <div class="desc-text-loose">Summoned Unit</div>
            </td>
        </tr>
    `;

            // base stats
            // base stats
            for (let key in levelEntry) {
                if (ignoreKeys.includes(key)) continue;
                let displayVal = formatStatValue(key, levelEntry[key]);
                let desc = statDescriptions[key];
                let descId = `desc-summoned-${unitKey}-${key}`;
                html += `
        <tr>
            <td>${statDisplayMap[key] || formatKey(key)}${desc ? ` <button onclick="let d = document.getElementById('${descId}'); d.style.display = d.style.display === 'none' ? 'table-row' : 'none';" class="info-btn">i</button>` : ""}</td>
            <td>${displayVal}</td>
        </tr>
        ${desc ? `<tr id="${descId}" style="display:none;"><td colspan="2" class="desc-text">${desc}</td></tr>` : ""}
    `;
            }

            // extra meta stats
            let extraStats = buildExtraStats(meta);

            html += `<tr><td colspan="${colspan}" class="section-header">📊 Extra Info</td></tr>`;
            for (let key in extraStats) {
                if (extraStats[key] === undefined) continue;
                let displayVal = extraStats[key];
                if (key === "navigationMask") {
                    displayVal = displayVal === 0 ? "Land" : displayVal === 1 ? "Air" : displayVal;

                let desc = statDescriptions[key];
                let descId = `desc-summoned-extra-${unitKey}-${key}`;

            <td>${displayVal}</td>
        </tr>
        ${desc ? `<tr id="${descId}" style="display:none;"><td colspan="2" class="desc-text">${desc}</td></tr>` : ""}
    `;
            }

            return html;
        }

                  " class="info-btn">i</button>` : ""}</span>
                  <img src="images/${displayKey.toUpperCase()}.jpg" class="stat-icon">
                </span>
              </td>
              <td>${displayVal}</td>
            </tr>
            ${desc ? `
            <tr id="desc-single-extra-${displayKey}" style="display:none;">
              <td colspan="2" class="desc-text">${desc}</td>
            </tr>
            ` : ""}
          `;
                }

                if (extraRows) {
                    html += `<tr><td colspan="2" class="section-header">📊 Extra Info</td></tr>${extraRows}`;
                }

                // abilities section — image + name below, then stat rows
                // abilities section — image + name below, then stat rows
                if (abilities && abilities.length > 0) {
                    html += `<tr><td colspan="3" class="section-header">⚔️ Abilities</td></tr>`;
                    let imageShown = false;

                    abilities.forEach(function (ability) {
                        if (ability.name) {
                            let abilityDesc = getAbilityDescription(ability.abilityInfoId);
                            html += `
                              <tr>
                                <td colspan="3" class="img-row">
                                  ${!imageShown ? `<img class="troop-img" src="images/${ability.abilityInfoId.toUpperCase()}.jpg" alt="${ability.name}" />` : ""}
                                  <div class="ability-name">${getAbilityTitle(ability.abilityInfoId) || formatKey(ability.name)}${basicAttackAbilities[ability.abilityInfoId] ? "<br><span style='font-size:16px; color:gray;'>(Basic Attack)</span>" : ""}</div>
                                  ${abilityDesc && !imageShown ? `<div class="ability-desc-block">${abilityDesc}</div>` : ""}
                                </td>
                              </tr>
                            `;
                            imageShown = true;
                        }
                        for (let key in ability) {
                            if (key === "name" || key === "abilityInfoId" || abilityIgnoreKeys.includes(key)) continue;
                            let val = ability[key];
                            let desc = getStatDescription(key, ability.abilityInfoId);

                            if (key === "summonedTroopId") {
                                let troopBaseKey = val.replace(/_\d+$/, "");
                                if (renderedSummons.has(troopBaseKey)) continue;
                                renderedSummons.add(troopBaseKey);

                                let troopEntry = troopList.find(t => t.key === troopBaseKey) || buildHiddenTroopEntry(troopBaseKey);
                                let isHidden = !troopEntry || troopEntry.meta?.order === -1;

                                if (isHidden) {
                                    html += `<tr><td colspan="2" class="section-header">⚔️ Summoned Unit</td></tr>`;
                                    html += buildSummonedUnitRows(troopBaseKey, troopsLevel, 2);
                                } else {
                                    let troopName = troopEntry.displayName;
                                    let linkVal = `<span class="linked-unit-badge">
        🔗 ${troopName}</span>`;
                                    html += `<tr><td>${formatKey(key)}</td><td>${linkVal}</td></tr>`;
                                }
                                continue;
                            }

                            html += `
                              <tr>
                                <td style="text-align:center; color:white">${getStatLabel(key, ability.abilityInfoId)}${desc ? ` <button onclick="
                                    let d = document.getElementById('desc-single-cmp-ability-${key}');
                                    d.style.display = d.style.display === 'none' ? 'table-row' : 'none';
                                " class="info-btn">i</button>` : ""}</td>
                                <td class="ta-center">${formatStatValue(key, ability[key])}</td>
                              </tr>
                              ${desc ? `
                              <tr id="desc-single-cmp-ability-${key}" style="display:none;">
                                <td colspan="2" class="desc-text">${desc}</td>
                              </tr>` : ""}
                            `;
                        }
                    });
                }


                // talents section — image + name below, then stat rows
                if (talents && talents.length > 0) {
                    html += `<tr><td colspan="2" class="section-header">✨ Talents</td></tr>`;

                    let talentDesc = getTalentDescription(selected.key);
                    let talentIcon = getTalentIcon(selected.key);     // or selected.key
                    if (talentIcon || talentDesc) {
                        html += `
                      <tr>
                        <td colspan="2" class="img-row">
                          ${talentIcon ? `<img class="troop-img" src="images/${talentIcon.toUpperCase()}.jpg" alt="${talentIcon}" />` : ""}
                          <div class="ability-name">${talentIcon ? formatKey(talentIcon.split("_").slice(2).join("_")) : ""}</div>
                          ${talentDesc ? `<div class="ability-desc-block">${talentDesc}</div>` : ""}
                        </td>
                      </tr>
                    `;
                    }


                    let seenTalentNames = new Set();

                    // show talent name


                    // type always first, formatted
                    talents.forEach(function (talent, talentIndex) {
                        if (talent.name && seenTalentNames.has(talent.name)) return;
                        if (talent.name) seenTalentNames.add(talent.name);

                        for (let key in talent) {
                            if (talentSkipKeys.includes(key)) continue;
                            if (key.toLowerCase() === "name") continue;
                            let val = talent[key];
                            let desc = statDescriptions[key];
                            let safeKey = key;

                            if (safeKey === "type") continue; // skip raw type row — used as a label below instead

                            // special handling for summonedTroopId
                            let displayVal;
                            if (safeKey === "summonedTroopId") {
                                let troopBaseKey = val.replace(/_\d+$/, "");

                                if (renderedSummons.has(troopBaseKey)) continue;
                                renderedSummons.add(troopBaseKey);
                                let troopEntry = troopList.find(t => t.key === troopBaseKey) || buildHiddenTroopEntry(troopBaseKey);
                                let isHidden = !troopEntry || troopEntry.meta?.order === -1;
                                if (isHidden) {
                                    html += `<tr><td colspan="2" class="section-header">⚔️ Summoned Unit</td></tr>`;
                                    html += buildSummonedUnitRows(troopBaseKey, troopsLevel, 2);
                                    displayVal = null;
                                } else {
                                    let troopName = troopEntry.displayName;
                                    displayVal = `<span class="linked-unit-badge"
            onclick="
                troopNavStack.push({ unit: selectTroop, level: parseInt(troopsLevel) });
                selectTroop = troopList.find(t => t.key === '${troopBaseKey}') || buildHiddenTroopEntry('${troopBaseKey}');
                troopType = 'troop'; updateTroopsCard(); window.scrollTo(0,0);
            ">🔗 ${troopName}</span>`;
                                }
                            } else {
                                displayVal = formatStatValue(safeKey, val);
                            }

                            let btn = desc ? ' <button onclick="let d = document.getElementById(\'desc-troop-talent-' + talentIndex + '-' + key + '\'); d.style.display = d.style.display === \'none\' ? \'table-row\' : \'none\';" class="info-btn">i</button>' : "";
                            let descRow = desc ? '<tr id="desc-troop-talent-' + talentIndex + '-' + key + '" style="display:none;"><td colspan="2" class="desc-text">' + desc + '</td></tr>' : "";
                            let label = formatKey(safeKey);
                            if (safeKey === "value" && talent.type) {
                                label = formatKey(talent.type);
                            }
                            if (displayVal !== null) {
                                html += '<tr><td>' + label + btn + '</td><td>' + displayVal + '</td></tr>' + descRow;
                            }
                        }
                    });
                }


                html += `</table>`;
                compareCard.innerHTML = html;
                persistedOpenDescs.forEach(id => {
                    let el = document.getElementById(id);
                    if (el) el.style.display = "table-row";
                });
                updateTabsHeight();
            } else {
                // nothing selected — clear everything
                compareCard.innerHTML = "";
            }
        }

        // left search — searches both troops and heroes
        document.getElementById("leftSearch").addEventListener("input", function () {
            if (this.value === "") {
                selectleft = null;
                leftType = null;
                document.getElementById("leftResults").innerHTML = "";
                updateCards();
                return;
            }
            let query = this.value.toLowerCase();
            let troopMatches = troopList.filter((troop) => troop.displayName.toLowerCase().includes(query));
            let heroMatches = heroList.filter((hero) => hero.displayName.toLowerCase().includes(query));
            let resultsDiv = document.getElementById("leftResults");
            resultsDiv.innerHTML = "";

            troopMatches.forEach(function (troop) {
                let item = document.createElement("div");
                item.innerHTML = `<img src="images/${troop.key.toUpperCase()}.jpg" class="stat-icon"> ${troop.displayName}`;
                item.classList.add(troop.rarity.toLowerCase());
                item.classList.add("search-result-item");
                item.addEventListener("click", function () {
                    selectleft = troop;
                    leftType = "troop";
                    document.getElementById("leftSearch").value = troop.displayName;
                    resultsDiv.innerHTML = "";
                    updateCards();
                    window.scrollTo(0, 0);
                });
                resultsDiv.appendChild(item);
            });

            heroMatches.forEach(function (hero) {
                let item = document.createElement("div");
                item.innerHTML = `<img src="images/${hero.key.toUpperCase()}.jpg" class="stat-icon"> ${hero.displayName}`;
                item.classList.add(hero.rarity.toLowerCase());
                item.classList.add("search-result-item");
                item.addEventListener("click", function () {
                    selectleft = hero;
                    leftType = "hero";
                    document.getElementById("leftSearch").value = hero.displayName;
                    resultsDiv.innerHTML = "";
                    updateCards();
                    window.scrollTo(0, 0);
                });
                resultsDiv.appendChild(item);
            });
        });

        // right search — searches both troops and heroes
        document.getElementById("rightSearch").addEventListener("input", function () {
            if (this.value === "") {
                selectright = null;
                rightType = null;
                document.getElementById("rightResults").innerHTML = "";
                updateCards();
                return;
            }
            let query = this.value.toLowerCase();
            let troopMatches = troopList.filter((troop) => troop.displayName.toLowerCase().includes(query));
            let heroMatches = heroList.filter((hero) => hero.displayName.toLowerCase().includes(query));
            let resultsDiv = document.getElementById("rightResults");
            resultsDiv.innerHTML = "";

            troopMatches.forEach(function (troop) {
                let item = document.createElement("div");
                item.innerHTML = `<img src="images/${troop.key.toUpperCase()}.jpg" class="stat-icon"> ${troop.displayName}`;
                item.classList.add(troop.rarity.toLowerCase());
                item.classList.add("search-result-item");
                item.addEventListener("click", function () {
                    selectright = troop;
                    rightType = "troop";
                    document.getElementById("rightSearch").value = troop.displayName;
                    resultsDiv.innerHTML = "";
                    updateCards();
                    window.scrollTo(0, 0);
                });
                resultsDiv.appendChild(item);
            });

            heroMatches.forEach(function (hero) {
                let item = document.createElement("div");
                item.innerHTML = `<img src="images/${hero.key.toUpperCase()}.jpg" class="stat-icon"> ${hero.displayName}`;
                item.classList.add(hero.rarity.toLowerCase());
                item.classList.add("search-result-item");
                item.addEventListener("click", function () {
                    selectright = hero;
                    rightType = "hero";
                    document.getElementById("rightSearch").value = hero.displayName;
                    resultsDiv.innerHTML = "";
                    updateCards();
                    window.scrollTo(0, 0);
                });
                resultsDiv.appendChild(item);
            });
        });

        document.getElementById("leftSlider").addEventListener("input", function () {
            leftLevel = this.value;
            document.getElementById("leftLevel").textContent = "Level " + leftLevel;
            updateCards();
        });

        document.getElementById("rightSlider").addEventListener("input", function () {
            rightLevel = this.value;
            document.getElementById("rightLevel").textContent = "Level " + rightLevel;
            updateCards();
        });

    </script>
</body>
